<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract - Load Testing Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
</head>
<body>

<!-- Header -->
<div class="header">
    <h1><span class="brand-mark">Abstract</span> Load Testing</h1>
    <div class="status-badge">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Disconnected</span>
    </div>
</div>

<!-- Split View -->
<div class="split-view">

<!-- ==================== ARCHITECTURE (left column) ==================== -->
<div class="split-arch">
<!-- ==================== CONTROL PANEL ==================== -->
<div class="control-panel">

    <!-- Section: Carga (load generator) -->
    <section class="cp-section cp-section-load">
        <header class="cp-section-head">
            <span class="cp-section-title">Carga</span>
            <span class="cp-section-hint">generador de tráfico</span>
        </header>
        <div class="cp-row">
            <button class="cp-btn cp-btn-primary" id="toggleBtn" onclick="toggleLoad()">Start</button>
            <label class="cp-field cp-field-inline">
                <span class="cp-field-label" data-tooltip="Requests por segundo. Se aplica en tiempo real al generador, sin reiniciarlo.">RPS</span>
                <input type="range" id="rpsSlider" min="1" max="500" value="10" oninput="onRpsChange(this.value)">
                <span class="cp-field-value" id="rpsValue">10</span>
            </label>
            <label class="cp-field cp-field-url">
                <span class="cp-field-label" data-tooltip="Endpoint que recibe la carga (POST). Por defecto apunta al ingress Traefik del cluster k3d.">Target</span>
                <input type="text" id="targetUrl" value="http://localhost:8080/work" onchange="onUrlChange(this.value)">
            </label>
        </div>
    </section>

    <!-- Section: Cluster config (collapsible) -->
    <section class="cp-section cp-section-cluster" id="clusterConfig">
        <header class="cp-section-head cp-section-head-clickable" onclick="toggleConfigPanel()">
            <span class="cp-toggle" id="ccToggle">▸</span>
            <span class="cp-section-title">Cluster</span>
            <span class="cp-section-hint">HPA + Deployment</span>
            <span class="cp-spacer"></span>
            <span class="cc-badge" id="ccBadge" data-state="synced">
                <span class="cc-badge-dot"></span>
                <span class="cc-badge-label" id="ccBadgeLabel">Synced</span>
            </span>
        </header>
        <div class="cp-section-body" id="ccBody" hidden>
            <div class="cc-warning" id="ccWarning" hidden>
                ⚠ Pausá el generador de carga para editar estos valores.
            </div>
            <div class="cc-columns">
                <div class="cc-group">
                    <div class="cc-group-title">HPA</div>
                    <div class="cc-grid">
                        <label class="cc-field">
                            <span class="cp-field-label" data-tooltip="Pods mínimos que el HPA mantiene activos, incluso sin carga.">min replicas</span>
                            <input type="range" id="ccMinReplicas" min="1" max="10" step="1"
                                   oninput="onConfigInput('min_replicas', this.value)">
                            <span class="cc-value" id="ccMinReplicasValue"></span>
                        </label>
                        <label class="cc-field">
                            <span class="cp-field-label" data-tooltip="Techo del autoscaling. El HPA nunca escala por encima de este número, aunque haya carga alta.">max replicas</span>
                            <input type="range" id="ccMaxReplicas" min="1" max="20" step="1"
                                   oninput="onConfigInput('max_replicas', this.value)">
                            <span class="cc-value" id="ccMaxReplicasValue"></span>
                        </label>
                        <label class="cc-field">
                            <span class="cp-field-label" data-tooltip="Utilización de CPU promedio (relativa al request del pod) que gatilla al HPA a agregar replicas.">target CPU %</span>
                            <input type="range" id="ccTargetCpu" min="10" max="100" step="1"
                                   oninput="onConfigInput('target_cpu_utilization', this.value)">
                            <span class="cc-value" id="ccTargetCpuValue"></span>
                        </label>
                        <label class="cc-field">
                            <span class="cp-field-label" data-tooltip="Utilización de memoria promedio (relativa al request del pod). Señal secundaria, junto con CPU.">target memory %</span>
                            <input type="range" id="ccTargetMem" min="10" max="100" step="1"
                                   oninput="onConfigInput('target_memory_utilization', this.value)">
                            <span class="cc-value" id="ccTargetMemValue"></span>
                        </label>
                    </div>
                </div>
                <div class="cc-group">
                    <div class="cc-group-title">Deployment</div>
                    <div class="cc-grid">
                        <label class="cc-field">
                            <span class="cp-field-label" data-tooltip="CPU garantizada por pod en millicores (1000m = 1 core). Además es el denominador del cálculo de utilización del HPA.">cpu request (m)</span>
                            <input type="range" id="ccCpuRequest" min="50" max="1000" step="10"
                                   oninput="onConfigInput('cpu_request_millicores', this.value)">
                            <span class="cc-value" id="ccCpuRequestValue"></span>
                        </label>
                        <label class="cc-field">
                            <span class="cp-field-label" data-tooltip="Techo duro de CPU por pod. El kernel throttlea arriba de este valor. Debe ser ≥ request.">cpu limit (m)</span>
                            <input type="range" id="ccCpuLimit" min="50" max="2000" step="10"
                                   oninput="onConfigInput('cpu_limit_millicores', this.value)">
                            <span class="cc-value" id="ccCpuLimitValue"></span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="cc-errors" id="ccErrors"></div>
            <div class="cc-actions">
                <button class="cc-btn cc-btn-secondary" id="ccResetBtn" onclick="onConfigReset()">Reset</button>
                <button class="cc-btn cc-btn-primary" id="ccApplyBtn" onclick="onConfigApply()" disabled>Apply</button>
            </div>
        </div>
    </section>

</div>

<div class="arch-container">
<svg viewBox="0 0 960 680" class="arch-svg" xmlns="http://www.w3.org/2000/svg">
<defs>
    <!-- Glow filters -->
    <filter id="glowGreen" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowViolet" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowOrange" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
        <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>

    <!-- Arrow marker for request flow -->
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#20e492"/>
    </marker>
    <marker id="arrowViolet" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#8b7cf6"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6" fill="#f5a623"/>
    </marker>

    <!-- Particle motion paths (invisible, only for animateMotion) -->
    <path id="mpathWS" d="M 480 58 L 480 110" fill="none"/>
    <path id="mpathHTTP" d="M 260 198 C 260 232, 260 248, 260 300" fill="none"/>
    <path id="mpathTraefikSvc" d="M 260 348 L 260 388" fill="none"/>
    <path id="mpathSvcPods" d="M 260 434 L 260 450" fill="none"/>
    <path id="mpathK8sAPI" d="M 700 198 C 700 232, 700 248, 700 300" fill="none"/>
    <path id="mpathMetricsHPA" d="M 700 348 L 700 388" fill="none"/>
    <path id="mpathHPAPods" d="M 700 434 L 700 450" fill="none"/>
    <!-- Horizontal motion paths -->
    <path id="mpathWSUp" d="M 480 110 L 480 58" fill="none"/>
    <path id="mpathPodsToMetrics" d="M 480 450 L 480 340 C 480 318, 530 318, 600 327" fill="none"/>
    <path id="mpathHPAToSvc" d="M 600 409 L 360 409" fill="none"/>
</defs>

<!-- ===== CONNECTION LINES (behind everything) ===== -->
<g id="archConnections">
    <!-- Request flow: Browser → Backend -->
    <line id="connWS" class="conn-line conn-request" x1="480" y1="58" x2="480" y2="110"/>
    <!-- Request flow: Backend(LoadGen) → Cluster(Traefik) -->
    <path id="connHTTP" class="conn-line conn-request" d="M 260 198 C 260 240, 260 255, 260 300" marker-end="url(#arrowGreen)"/>
    <!-- Request flow: Traefik → Service -->
    <line id="connTraefikSvc" class="conn-line conn-request" x1="260" y1="348" x2="260" y2="388"/>
    <!-- Request flow: Service → Pods box top -->
    <line id="connSvcPods" class="conn-line conn-request" x1="260" y1="434" x2="260" y2="450" marker-end="url(#arrowGreen)"/>

    <!-- Metrics flow: K8sMonitor → Cluster(metrics-server) -->
    <path id="connK8sAPI" class="conn-line conn-metrics" d="M 700 198 C 700 240, 700 255, 700 300" marker-end="url(#arrowViolet)"/>
    <!-- Metrics flow: metrics-server → HPA -->
    <line id="connMetricsHPA" class="conn-line conn-metrics" x1="700" y1="348" x2="700" y2="388"/>

    <!-- Scaling: HPA → Pods box top-right -->
    <line id="connHPAPods" class="conn-line conn-scaling" x1="700" y1="434" x2="700" y2="450" marker-end="url(#arrowOrange)"/>

    <!-- Pods box → metrics-server (up through center gap, then right) -->
    <path id="connPodsToMetrics" class="conn-line conn-metrics" d="M 480 450 L 480 340 C 480 318, 530 318, 600 327" marker-end="url(#arrowViolet)"/>

    <!-- HORIZONTAL: HPA → Service (scaling feedback, left arrow) -->
    <path id="connHPAToSvc" class="conn-line conn-scaling" d="M 600 409 L 360 409" marker-end="url(#arrowOrange)"/>

</g>

<!-- ===== CLUSTER BOX ===== -->

    <!-- Rendered by JS -->
</g>

<!-- ===== ANIMATED PARTICLES ===== -->
<!-- Request flow particles (visible when load is running) -->
<g id="archRequestParticles" style="display:none;">
    <!-- WS segment -->
    <circle class="particle" r="3.5"><animateMotion dur="0.8s" repeatCount="indefinite" begin="0s"><mpath href="#mpathWS"/></animateMotion></circle>
    <circle class="particle" r="3"><animateMotion dur="0.8s" repeatCount="indefinite" begin="0.4s"><mpath href="#mpathWS"/></animateMotion></circle>
    <!-- HTTP segment -->
    <circle class="particle" r="3.5"><animateMotion dur="1.2s" repeatCount="indefinite" begin="0s"><mpath href="#mpathHTTP"/></animateMotion></circle>
    <circle class="particle" r="3"><animateMotion dur="1.2s" repeatCount="indefinite" begin="0.4s"><mpath href="#mpathHTTP"/></animateMotion></circle>
    <circle class="particle" r="2.5"><animateMotion dur="1.2s" repeatCount="indefinite" begin="0.8s"><mpath href="#mpathHTTP"/></animateMotion></circle>
    <!-- Traefik → Service -->
    <circle class="particle" r="3"><animateMotion dur="0.6s" repeatCount="indefinite" begin="0s"><mpath href="#mpathTraefikSvc"/></animateMotion></circle>
    <circle class="particle" r="2.5"><animateMotion dur="0.6s" repeatCount="indefinite" begin="0.3s"><mpath href="#mpathTraefikSvc"/></animateMotion></circle>
    <!-- Service → Pods -->
    <circle class="particle" r="3"><animateMotion dur="0.5s" repeatCount="indefinite" begin="0s"><mpath href="#mpathSvcPods"/></animateMotion></circle>
    <circle class="particle" r="2.5"><animateMotion dur="0.5s" repeatCount="indefinite" begin="0.25s"><mpath href="#mpathSvcPods"/></animateMotion></circle>
</g>

<script>
// ============================================================
//  STATE
// ============================================================
let ws = null;
let isRunning = false;
// ---- Cluster config state ----
let clusterConfig = {
    current: null,
    defaults: null,
    draft: null,
    state: 'synced',   // 'synced' | 'modified' | 'applying' | 'error'
    error: null,
};
const CC_RANGES = {
    min_replicas:               [1, 10],
    max_replicas:               [1, 20],
    target_cpu_utilization:     [10, 100],
    target_memory_utilization:  [10, 100],
    cpu_request_millicores:     [50, 1000],
    cpu_limit_millicores:       [50, 2000],
};
const CC_INPUT_IDS = {
    min_replicas:              'ccMinReplicas',
    max_replicas:              'ccMaxReplicas',
    target_cpu_utilization:    'ccTargetCpu',
    target_memory_utilization: 'ccTargetMem',
    cpu_request_millicores:    'ccCpuRequest',
    cpu_limit_millicores:      'ccCpuLimit',
};
const CC_VALUE_IDS = {
    min_replicas:              'ccMinReplicasValue',
    max_replicas:              'ccMaxReplicasValue',
    target_cpu_utilization:    'ccTargetCpuValue',
    target_memory_utilization: 'ccTargetMemValue',
    cpu_request_millicores:    'ccCpuRequestValue',
    cpu_limit_millicores:      'ccCpuLimitValue',
};
const MAX_POINTS = 300;

// ============================================================
//  CHART SETUP
// ============================================================
const chartColors = {
    bg: '#111518', grid: '#222a2f', text: '#7c8a94',
    green: '#20e492', yellow: '#f5a623', red: '#e74c4c',
    blue: '#4ca4f5', accent: '#8b7cf6',
};

const commonScaleOpts = {
    x: {
        type: 'time',
        time: { unit: 'second', displayFormats: { second: 'HH:mm:ss' }, tooltipFormat: 'HH:mm:ss' },
        grid: { color: chartColors.grid },
        ticks: { color: chartColors.text, maxTicksLimit: 8, font: { size: 10 } },
    },
};

function makeYScale(opts = {}) {
    return { beginAtZero: true, grid: { color: chartColors.grid }, ticks: { color: chartColors.text, font: { size: 10 }, ...opts } };
}

const responseTimes = new Chart(document.getElementById('chartResponseTimes'), {
    type: 'line',
    data: { datasets: [
        { label: 'Avg', borderColor: chartColors.green, backgroundColor: chartColors.green + '15', data: [], tension: 0.4, pointRadius: 0, borderWidth: 1.5, fill: true },
        { label: 'P90', borderColor: chartColors.yellow, backgroundColor: chartColors.yellow + '10', data: [], tension: 0.4, pointRadius: 0, borderWidth: 1.5, fill: false },
        { label: 'P99', borderColor: chartColors.red, backgroundColor: chartColors.red + '10', data: [], tension: 0.4, pointRadius: 0, borderWidth: 1.5, fill: false },
    ]},
    options: {
        responsive: true, maintainAspectRatio: false, animation: { duration: 300 },
        plugins: { legend: { labels: { color: chartColors.text, usePointStyle: true, pointStyle: 'circle', font: { size: 10, family: "'Inter', sans-serif" }, padding: 16 } } },
        scales: { ...commonScaleOpts, y: { ...makeYScale(), title: { display: true, text: 'ms', color: chartColors.text, font: { size: 10 } } } },
    },
});

const replicasChart = new Chart(document.getElementById('chartReplicas'), {
    type: 'line',
    data: { datasets: [
        { label: 'Running', borderColor: chartColors.green, backgroundColor: chartColors.green + '12', data: [], stepped: 'before', pointRadius: 0, borderWidth: 1.5, fill: true },
        { label: 'Desired', borderColor: chartColors.text, data: [], stepped: 'before', pointRadius: 0, borderWidth: 1, borderDash: [5, 3], fill: false },
    ]},
    options: {
        responsive: true, maintainAspectRatio: false, animation: { duration: 300 },
        plugins: { legend: { labels: { color: chartColors.text, usePointStyle: true, pointStyle: 'circle', font: { size: 10, family: "'Inter', sans-serif" }, padding: 12 } } },
        scales: { ...commonScaleOpts, y: { ...makeYScale({ stepSize: 1 }), title: { display: true, text: 'pods', color: chartColors.text } } },
    },
});

const cpuChart = new Chart(document.getElementById('chartCpu'), {
    type: 'line',
    data: { datasets: [
        { label: 'Avg CPU %', borderColor: chartColors.accent, backgroundColor: chartColors.accent + '12', data: [], tension: 0.4, pointRadius: 0, borderWidth: 1.5, fill: true },
    ]},
    options: {
        responsive: true, maintainAspectRatio: false, animation: { duration: 300 },
        plugins: { legend: { labels: { color: chartColors.text, usePointStyle: true, pointStyle: 'circle', font: { size: 10, family: "'Inter', sans-serif" }, padding: 12 } } },
        scales: { ...commonScaleOpts, y: { ...makeYScale({ callback: v => v + '%' }), suggestedMax: 100, title: { display: true, text: '%', color: chartColors.text } } },
    },
});

// ============================================================
//  WEBSOCKET
// ============================================================
function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.onopen = () => {
        document.getElementById('statusDot').classList.add('connected');
        document.getElementById('statusText').textContent = 'Connected';
        send({ action: 'get_cluster_config' });
    };
    ws.onclose = () => {
        document.getElementById('statusDot').classList.remove('connected');
        document.getElementById('statusText').textContent = 'Disconnected';
        setTimeout(connect, 3000);
    };
    ws.onerror = () => ws.close();
    ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'metrics') {
            updateDashboard(data);
            updateArchitecture(data);
        } else if (data.type === 'cluster_config') {
            onClusterConfigReceived(data);
        } else if (data.type === 'cluster_config_result') {
            onClusterConfigResult(data);
        }
    };
}

function send(msg) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(msg));
}

// ============================================================
//  MONITORING CONTROLS
// ============================================================
function toggleLoad() {
    isRunning = !isRunning;
    send({ action: isRunning ? 'start' : 'pause' });
    updateToggleBtn();
}

function updateToggleBtn() {
    const btn = document.getElementById('toggleBtn');
    btn.textContent = isRunning ? 'Pause' : 'Start';
    btn.className = isRunning ? 'cp-btn cp-btn-pause' : 'cp-btn cp-btn-primary';
}

function onRpsChange(value) {
    document.getElementById('rpsValue').textContent = value;
    send({ action: 'set_rps', value: parseFloat(value) });
}

function onUrlChange(value) {
    send({ action: 'set_url', value: value });
}

// ============================================================
//  MONITORING UPDATE
// ============================================================
function updateDashboard(data) {
    const now = new Date(data.timestamp * 1000);
    if (data.load.is_running !== isRunning) { isRunning = data.load.is_running; updateToggleBtn(); }

    pushPoint(responseTimes, 0, now, data.response_times.avg_ms);
    pushPoint(responseTimes, 1, now, data.response_times.p90_ms);
    pushPoint(responseTimes, 2, now, data.response_times.p99_ms);
    responseTimes.update('none');

    pushPoint(replicasChart, 0, now, data.cluster.replicas);
    pushPoint(replicasChart, 1, now, data.cluster.hpa_desired);
    replicasChart.update('none');

    const avgCpu = data.cluster.pods.length > 0
        ? data.cluster.pods.reduce((sum, p) => sum + p.cpu_percent, 0) / data.cluster.pods.length : 0;
    pushPoint(cpuChart, 0, now, avgCpu);
    cpuChart.update('none');

    // Re-render config panel so gating (disabled) tracks is_running.
    renderConfigPanel();
}

function pushPoint(chart, idx, x, y) {
    const ds = chart.data.datasets[idx];
    ds.data.push({ x, y });
    if (ds.data.length > MAX_POINTS) ds.data.shift();
}


// ============================================================
//  CLUSTER CONFIG
// ============================================================
function toggleConfigPanel() {
    const body = document.getElementById('ccBody');
    const toggle = document.getElementById('ccToggle');
    const wasHidden = body.hasAttribute('hidden');
    if (wasHidden) {
        body.removeAttribute('hidden');
        toggle.classList.add('open');
        toggle.textContent = '▾';
    } else {
        body.setAttribute('hidden', '');
        toggle.classList.remove('open');
        toggle.textContent = '▸';
    }
    localStorage.setItem('clusterConfigExpanded', wasHidden ? '1' : '0');
}

function onClusterConfigReceived(data) {
    if (!data.current) return;
    clusterConfig.current = { ...data.current };
    clusterConfig.defaults = data.defaults ? { ...data.defaults } : null;
    // Hydrate draft from current on first load or after successful apply
    if (!clusterConfig.draft || clusterConfig.state !== 'modified') {
        clusterConfig.draft = { ...data.current };
    }
    clusterConfig.error = null;
    clusterConfig.state = computeState();
    renderConfigPanel();
}

function onClusterConfigResult(data) {
    if (data.status === 'ok') {
        clusterConfig.state = 'applying';  // will be flipped to 'synced' when cluster_config arrives
        clusterConfig.error = null;
    } else {
        clusterConfig.state = 'error';
        clusterConfig.error = data.error || data.status;
    }
    renderConfigPanel();
}

function onConfigInput(field, rawValue) {
    if (!clusterConfig.draft) return;
    clusterConfig.draft[field] = parseInt(rawValue, 10);
    clusterConfig.state = computeState();
    clusterConfig.error = null;
    renderConfigPanel();
}

function onConfigApply() {
    if (clusterConfig.state !== 'modified') return;
    if (validateDraft(clusterConfig.draft).length > 0) return;
    clusterConfig.state = 'applying';
    renderConfigPanel();
    send({ action: 'apply_cluster_config', value: clusterConfig.draft });
}

function onConfigReset() {
    clusterConfig.state = 'applying';
    renderConfigPanel();
    send({ action: 'reset_cluster_config' });
}

function computeState() {
    if (!clusterConfig.current || !clusterConfig.draft) return 'synced';
    const equal = Object.keys(CC_RANGES).every(
        k => clusterConfig.draft[k] === clusterConfig.current[k]
    );
    return equal ? 'synced' : 'modified';
}

function validateDraft(draft) {
    const errors = [];
    if (!draft) return errors;
    for (const [field, [lo, hi]] of Object.entries(CC_RANGES)) {
        const v = draft[field];
        if (!Number.isInteger(v) || v < lo || v > hi) {
            errors.push(`${field} must be between ${lo} and ${hi}`);
        }
    }
    if (draft.min_replicas > draft.max_replicas) {
        errors.push(`min_replicas (${draft.min_replicas}) must be ≤ max_replicas (${draft.max_replicas})`);
    }
    if (draft.cpu_request_millicores > draft.cpu_limit_millicores) {
        errors.push(`cpu_request (${draft.cpu_request_millicores}m) must be ≤ cpu_limit (${draft.cpu_limit_millicores}m)`);
    }
    return errors;
}

function escapeHtml(s) {
    return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function renderConfigPanel() {
    const draft = clusterConfig.draft;
    if (!draft) return;

    // Sliders + value labels
    for (const field of Object.keys(CC_RANGES)) {
        const input = document.getElementById(CC_INPUT_IDS[field]);
        const label = document.getElementById(CC_VALUE_IDS[field]);
        if (input) input.value = draft[field];
        if (label) {
            if (field === 'target_cpu_utilization' || field === 'target_memory_utilization') {
                label.textContent = draft[field] + '%';
            } else if (field.endsWith('_millicores')) {
                label.textContent = draft[field] + 'm';
            } else {
                label.textContent = draft[field];
            }
        }
    }

    // Badge
    const badge = document.getElementById('ccBadge');
    const badgeLabel = document.getElementById('ccBadgeLabel');
    badge.dataset.state = clusterConfig.state;
    const labels = { synced: 'Synced', modified: 'Modified', applying: 'Applying…', error: 'Error' };
    badgeLabel.textContent = labels[clusterConfig.state] || clusterConfig.state;
    badge.title = clusterConfig.error || '';

    // Errors block
    const errorsDiv = document.getElementById('ccErrors');
    const errors = validateDraft(draft);
    const escapedErrors = errors.map(e => `<div>${escapeHtml(e)}</div>`).join('');
    if (clusterConfig.error) {
        errorsDiv.innerHTML = `<div>${escapeHtml(clusterConfig.error)}</div>` + escapedErrors;
    } else {
        errorsDiv.innerHTML = escapedErrors;
    }

    // Apply button enablement
    const applyBtn = document.getElementById('ccApplyBtn');
    applyBtn.disabled = clusterConfig.state !== 'modified' || errors.length > 0 || isRunning;

    // Reset enablement — disabled while applying or while load is running
    const resetBtn = document.getElementById('ccResetBtn');
    resetBtn.disabled = clusterConfig.state === 'applying' || isRunning;

    // Gating (load running)
    document.getElementById('ccWarning').hidden = !isRunning;
    for (const field of Object.keys(CC_INPUT_IDS)) {
        const el = document.getElementById(CC_INPUT_IDS[field]);
        if (el) el.disabled = isRunning || clusterConfig.state === 'applying';
    }
}

// ============================================================
//  ARCHITECTURE VIEW UPDATE
// ============================================================
let prevPodCount = 0;

function updateArchitecture(data) {
    const running = data.load.is_running;
    const pods = data.cluster.pods;
    const replicas = data.cluster.replicas;
    const desired = data.cluster.hpa_desired;
    const isScaling = desired > replicas;
    const avgCpu = pods.length > 0
        ? pods.reduce((s, p) => s + p.cpu_percent, 0) / pods.length : 0;

    // --- Toggle animated connections ---
    const reqConns = ['connWS', 'connHTTP', 'connTraefikSvc', 'connSvcPods'];
    reqConns.forEach(id => {
        document.getElementById(id).classList.toggle('active', running);
    });

    const metricsConns = ['connK8sAPI', 'connMetricsHPA', 'connPodsToMetrics'];
    metricsConns.forEach(id => {
        document.getElementById(id).classList.toggle('active', pods.length > 0);
    });

    const scalingConns = ['connHPAPods', 'connHPAToSvc'];
    scalingConns.forEach(id => {
        document.getElementById(id).classList.toggle('active', isScaling);
    });

    // --- Toggle particles ---
    document.getElementById('archRequestParticles').style.display = running ? '' : 'none';
    document.getElementById('archWSUpParticles').style.display = pods.length > 0 ? '' : 'none';
    document.getElementById('archMetricsParticles').style.display = pods.length > 0 ? '' : 'none';
    document.getElementById('archScalingParticles').style.display = isScaling ? '' : 'none';

    // --- Toggle horizontal flow labels ---
    document.getElementById('archLabelPodsMetrics').setAttribute('opacity', pods.length > 0 ? '1' : '0');
    document.getElementById('archLabelHPASvc').setAttribute('opacity', isScaling ? '1' : '0');

    // --- Scale label ---
    const scaleLabel = document.getElementById('archScaleLabel');
    scaleLabel.setAttribute('opacity', isScaling ? '1' : '0');
    if (isScaling) scaleLabel.textContent = `scaling ${replicas} → ${desired}`;

    // --- Pulse active components ---
    document.getElementById('archLoadGen').classList.toggle('arch-box-active', running);

    // --- Update metric labels ---
    document.getElementById('archLabelRps').textContent = running ? data.load.actual_rps + ' rps' : '0 rps';
    document.getElementById('archLabelAvg').textContent = data.response_times.avg_ms.toFixed(0) + ' ms';
    const cpuInt = data.cluster.hpa_current_cpu;
    document.getElementById('archLabelHPA').textContent = cpuInt != null ? `CPU ${cpuInt}%/50%` : 'CPU 50%';

    // --- Live panel ---
    const dot = document.getElementById('archStatusDot');
    const lbl = document.getElementById('archStatusLabel');
    dot.setAttribute('fill', running ? '#20e492' : '#e74c4c');
    lbl.textContent = running ? 'RUNNING' : 'PAUSED';
    lbl.setAttribute('fill', running ? '#20e492' : '#7c8a94');

    document.getElementById('archPanelRps').textContent = data.load.actual_rps;
    document.getElementById('archPanelReplicas').textContent = replicas + '/' + desired;
    document.getElementById('archPanelAvg').textContent = data.response_times.avg_ms.toFixed(0) + ' ms';
    document.getElementById('archPanelCpu').textContent = avgCpu.toFixed(0) + '%';

    // --- Render pods ---
    renderArchPods(pods, desired);
}

function renderArchPods(pods, desired) {
    const container = document.getElementById('archPods');
    const count = Math.max(pods.length, 1);

    // Skip full re-render if pod count unchanged — just update metrics
    if (count === prevPodCount && pods.length > 0) {
        pods.forEach((pod, i) => {
            const fill = document.getElementById('archPodFill' + i);
            const cpuText = document.getElementById('archPodCpu' + i);
            const cpuBar = document.getElementById('archPodCpuBar' + i);
            if (fill) {
                const color = pod.cpu_percent > 80 ? '#e74c4c' : pod.cpu_percent > 50 ? '#f5a623' : '#20e492';
                fill.setAttribute('fill', color);
                fill.setAttribute('fill-opacity', '0.15');
                if (cpuBar) { cpuBar.setAttribute('width', Math.min(64, pod.cpu_percent * 0.64)); cpuBar.setAttribute('fill', color); }
            }
            if (cpuText) { cpuText.textContent = pod.cpu_percent.toFixed(0) + '%'; }
        });
        return;
    }
    prevPodCount = count;

    // Pod dimensions
    const podW = count <= 6 ? 100 : 80;
    const podH = 72;
    const gap = count <= 6 ? 12 : 6;
    const totalW = count * podW + (count - 1) * gap;
    const startX = 480 - totalW / 2;
    const podY = 476;

    // Fixed-width container box spanning the cluster
    const boxX = 140;
    const boxY = 450;
    const boxW = 680;
    const boxH = podY + podH + 14 - boxY;

    let html = '';
    // Container box
    html += `<rect x="${boxX}" y="${boxY}" width="${boxW}" height="${boxH}" rx="10" fill="#13181c" stroke="#2a3238" stroke-width="1.2" stroke-dasharray="4 3"/>`;
    // Box label
    html += `<g transform="translate(${boxX + 10}, ${boxY + 14})">
        <rect x="0" y="0" width="10" height="7" rx="1.5" fill="none" stroke="#7c8a94" stroke-width="1"/>
        <circle cx="5" cy="3.5" r="1.2" fill="#7c8a94"/>
    </g>`;
    html += `<text x="${boxX + 26}" y="${boxY + 14}" fill="#7c8a94" font-size="9" font-weight="600" class="label-mono">Pods</text>`;
    html += `<text x="${boxX + 55}" y="${boxY + 14}" fill="#3d4854" font-size="9" class="label-mono">${count} replica${count > 1 ? 's' : ''}</text>`;

    // Individual pods inside the box
    for (let i = 0; i < count; i++) {
        const pod = pods[i] || { name: 'pending...', cpu_percent: 0, memory_mb: 0, status: 'Pending' };
        const px = startX + i * (podW + gap);
        const color = pod.cpu_percent > 80 ? '#e74c4c' : pod.cpu_percent > 50 ? '#f5a623' : '#20e492';
        const statusColor = pod.status === 'Running' ? '#20e492' : '#f5a623';
        const shortName = pod.name.length > 12 ? pod.name.slice(-10) : pod.name;
        const delay = i * 0.08;

        html += `<g class="arch-pod" style="animation-delay:${delay}s">
            <rect x="${px}" y="${podY}" width="${podW}" height="${podH}" rx="6" fill="#1a1f23" stroke="#2a3238" stroke-width="1"/>
            <rect id="archPodFill${i}" x="${px}" y="${podY}" width="${podW}" height="${podH}" rx="6" fill="${color}" fill-opacity="0.15"/>
            <g transform="translate(${px + 8}, ${podY + 10})">
                <rect x="0" y="0" width="10" height="7" rx="1.5" fill="none" stroke="${statusColor}" stroke-width="1"/>
                <circle cx="5" cy="3.5" r="1.2" fill="${statusColor}"/>
            </g>
            <text x="${px + 22}" y="${podY + 16}" fill="#e8eaed" font-size="${count <= 6 ? 8 : 7}" class="label-mono">${shortName}</text>
            <rect x="${px + 8}" y="${podY + 28}" width="64" height="3" rx="1.5" fill="#2a3238"/>
            <rect id="archPodCpuBar${i}" x="${px + 8}" y="${podY + 28}" width="${Math.min(64, pod.cpu_percent * 0.64)}" height="3" rx="1.5" fill="${color}"/>
            <text id="archPodCpu${i}" x="${px + 8}" y="${podY + 44}" fill="${color}" font-size="9" font-weight="700" class="label-mono">${pod.cpu_percent.toFixed(0)}%</text>
            <text x="${px + 8}" y="${podY + 58}" fill="#7c8a94" font-size="8" class="label-mono">${pod.memory_mb.toFixed(0)} MB</text>
            <circle cx="${px + podW - 10}" cy="${podY + 12}" r="3" fill="${statusColor}" opacity="0.8"/>
        </g>`;
    }

    container.innerHTML = html;
}

// ============================================================
//  INIT
// ============================================================
connect();
// Render initial empty architecture state
renderArchPods([{ name: 'python-api-...', cpu_percent: 0, memory_mb: 0, status: 'Pending' }], 1);
// Restore panel expanded state
if (localStorage.getItem('clusterConfigExpanded') === '1') {
    toggleConfigPanel();
}
</script>
